# @package _global_
# SONIC X2 Ultra — full BONES-SEED retargeted motion library (2,550 motions).
# Inherits the smoke config (motion-tracking + teleop encoders, no SMPL) but
# points `motion_file` at the combined loco + standing manipulation PKL built
# by `gear_sonic/data_process/build_x2_bones_seed_motion_lib.py`.

defaults:
  - /exp/manager/universal_token/all_modes/sonic_x2_ultra_smoke
  - _self_

exp_var: bones_seed
project_name: TRL_X2Ultra_BonesSeed

# Bigger default rollout for real (non-smoke) training. CLI override still wins.
num_envs: 4096

manager_env:
  commands:
    motion:
      motion_lib_cfg:
        motion_file: gear_sonic/data/motions/x2_ultra_bones_seed.pkl

algo:
  config:
    # 2,550 motions vs. 10 in the smoke library: budget more learning iters.
    num_learning_iterations: 30000
