# =============================================================================
# Real-deploy tuning schema
# =============================================================================
# Authoritative reference for the keys deploy_x2.sh accepts via
# --tuning-config PATH.yaml. This file is documentation; do NOT pass it as
# a tuning config (the deploy will load it but every value is illustrative
# rather than a real preset).
#
# PARITY RULE
# -----------
# Tuning configs are loaded ONLY in deploy_x2.sh local / onbot modes.
# Sim profiles (parity, handoff, gantry, gantry-dangle) deliberately reject
# --tuning-config so the bit-exact C++<->Python parity surface against
# eval_x2_mujoco.py cannot be silently perturbed. See
# gear_sonic_deploy/configs/real_deploy_tuning/README.md for rationale.
#
# Adding a knob: extend KEY_TO_FLAG in
# gear_sonic_deploy/scripts/tuning_config_to_args.py + the matching --flag in
# x2_deploy_onnx_ref.cpp's CliArgs/ParseCli + a forwarding line in
# deploy_x2.sh (or just rely on tuning_config_to_args.py to emit it). Then
# describe it here.
# =============================================================================

# Free-form metadata. Ignored by the translator. Use this to document
# WHY this preset exists, not WHAT it sets (the values speak for themselves).
description: |
  Schema reference -- not a real preset.

# ---- Existing C++ binary safety/timing knobs (already individual CLI flags;
#      pulled into the YAML so one preset captures an entire scenario) -------

# Symmetric clamp on the raw ONNX output (action_il) BEFORE multiplying by
# x2_action_scale. Matches IsaacLab training's action_clip_value (default
# 20.0). Negative = disabled (parity tests only).
action_clip: 20.0

# Per-joint hard clamp on |target - default_angles|, in radians. Negative
# = disabled. Use 0.30 for first powered runs, 0.60-0.80 for richer motions.
# Set to null to use the binary default (-1, disabled).
max_target_dev: 0.60

# Soft-start ramp (alpha-blend from latched WAIT pose to policy targets)
# duration in seconds. <=0 disables the ramp.
ramp_seconds: 2.0

# Soft-exit ramp duration in seconds (RAMP_OUT lerps from last policy
# command back to default_angles). <=0 = legacy immediate shutdown.
return_seconds: 2.0

# Tilt watchdog threshold on the IMU's gravity vector cosine. -0.3 trips
# at ~107 deg from upright (very permissive); -0.6 ~127 deg.
tilt_cos: -0.3

# ---- New post-policy filters (parity-safe by construction) ----------------

# First-order EMA cutoff on the published joint targets. The filter runs
# AFTER the safety stack and BEFORE the bus, never inside the policy's
# observation pipeline -- so --obs-dump output is identical with this on or
# off, and sim parity is preserved by the wrapper's hard refusal to load
# tuning configs in sim mode. RAMP_OUT and SAFE_HOLD bypass.
#
# Recommended values (50 Hz OnControl rate):
#   0.0 (or null)  -> disabled. Default.
#   8.0           -> ~5 Hz effective bandwidth. Tames leg/waist jitter
#                    without visibly delaying arm gestures.
#   5.0           -> ~3 Hz. More aggressive smoothing; arms may feel slow.
#   12.0          -> ~7.5 Hz. Light touch; preserves snappier motions.
target_lpf_hz: 0.0
