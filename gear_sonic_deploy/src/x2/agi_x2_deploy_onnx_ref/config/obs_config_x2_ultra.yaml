# =============================================================================
# Observation layout for the AgiBot X2 Ultra g1+g1_dyn fused ONNX policy.
#
# Source of truth: gear_sonic/scripts/eval_x2_mujoco.py + eval_x2_mujoco_onnx.py
# Verified by /tmp/x2_step0_isaaclab.pt slice-by-slice match (Phase 0).
#
# This file documents what the C++ deploy harness MUST construct on every
# control tick before invoking the ONNX session. It is machine-readable so a
# future codegen pass can use it to drive the C++ obs builder; for now it is
# documentation that mirrors the Python obs construction one-to-one.
# =============================================================================

robot:
  name: x2_ultra
  num_dofs: 31
  joint_order: mujoco          # the MJCF/URDF kinematic-tree (BFS) order

policy:
  onnx_kind: fused_g1          # encoder + decoder + FSQ in a single graph
  encoder_index: 0             # baked into the export (encoder_name="g1")
  control_dt: 0.02             # 50 Hz
  decimation: 4                # implicit-PD inner loop runs at 200 Hz
  history_len: 10              # CircularBuffer depth for proprioception
  num_future_frames: 10        # tokenizer reference-trajectory horizon
  dt_future_ref: 0.1           # tokenizer reference frame spacing (s)

actor_obs:
  total_dim: 1670
  layout: "[tokenizer(680) | proprioception(990)]"

  # ---------------------------------------------------------------------------
  # 990-D proprioception
  # CRITICAL: term order follows the PolicyCfg dataclass attribute order
  # (gear_sonic/envs/manager_env/mdp/observations.py lines 107-128), which is
  # NOT the same as the YAML ordering. Do not alphabetize.
  #
  # Within each term: 10 history frames, oldest at index 0, newest at index 9.
  # On reset / first sample, all 10 slots are broadcast-filled with the first
  # observation (mirrors IsaacLab CircularBuffer.buffer semantics; without
  # priming, frames 0..8 would be zero, which is OOD for any policy with
  # history).
  # ---------------------------------------------------------------------------
  proprioception:
    total_dim: 990
    term_order:
      - { name: base_ang_vel,   dim_per_frame: 3,  history_len: 10, total: 30,  joint_order: n/a, source: imu_torso.angular_velocity, frame: body }
      - { name: joint_pos_rel,  dim_per_frame: 31, history_len: 10, total: 310, joint_order: il,  source: hardware_joint_state.position - DEFAULT_DOF }
      - { name: joint_vel,      dim_per_frame: 31, history_len: 10, total: 310, joint_order: il,  source: hardware_joint_state.velocity }
      - { name: last_action,    dim_per_frame: 31, history_len: 10, total: 310, joint_order: il,  source: previous_policy_action }
      - { name: gravity_dir,    dim_per_frame: 3,  history_len: 10, total: 30,  joint_order: n/a, source: quat_rotate_inverse(base_quat, [0,0,-1]) }

  # ---------------------------------------------------------------------------
  # 680-D tokenizer slice -- PER-FRAME INTERLEAVED layout (matches PT
  # training, the IsaacLab encoder_input_for_mlp_view, and the bit-perfect
  # ONNX re-export by gear_sonic/scripts/reexport_x2_g1_onnx.py).
  #
  # Each of the 10 future frames contributes one 68-float block:
  #   bytes [k*68      .. k*68 + 31)  = jpos_fk_il (31)
  #   bytes [k*68 + 31 .. k*68 + 62)  = jvel_fk_il (31)
  #   bytes [k*68 + 62 .. k*68 + 68)  = rot6d(cur^-1 * future_k_root_quat) (6)
  #
  # The 6D rotation rep is the COLUMNS-flat form (matches IsaacLab's
  # ``mat[..., :2].reshape(B, -1)``). For a rotation matrix M the flattened
  # block is [M[0,0], M[0,1], M[1,0], M[1,1], M[2,0], M[2,1]] -- NOT the
  # rows-flat form [M[0,0], M[0,1], M[0,2], M[1,0], M[1,1], M[1,2]] that an
  # earlier C++ implementation used. See math_utils.hpp::rot6d_from_quat_xyzw
  # for the bug history.
  #
  # Bug history: prior to the bit-perfect ONNX re-export the deploy used the
  # "grouped" layout [all_cmd(620) | all_ori(60)] because the *old* (broken)
  # ONNX was exported via inference_helpers.py::UniversalTokenWrapper which
  # sliced ``obs[:, :620]`` as cmd and ``obs[:, 620:680]`` as ori. After the
  # re-export the ONNX consumes the same per-frame interleaved layout that
  # the trained MLP saw, so the C++ tokenizer was switched to interleaved
  # (gear_sonic_deploy/scripts/compare_deploy_vs_isaaclab_obs.py spots a
  # mismatch within milliseconds on the first CONTROL tick).
  # ---------------------------------------------------------------------------
  tokenizer:
    total_dim: 680
    onnx_layout: per_frame_interleaved
    components:
      - name: jpos
        dim_per_frame: 31
        num_frames: 10
        offset_within_frame: 0     # bytes [k*68 .. k*68 + 31)
        joint_order: il
        source: reference_motion at t + k * dt_future_ref
      - name: jvel
        dim_per_frame: 31
        num_frames: 10
        offset_within_frame: 31    # bytes [k*68 + 31 .. k*68 + 62)
        joint_order: il
        source: reference_motion at t + k * dt_future_ref
      - name: orientation_6d_cols
        dim_per_frame: 6
        num_frames: 10
        offset_within_frame: 62    # bytes [k*68 + 62 .. k*68 + 68)
        source: rot6d_cols(cur^-1 * future_k_root_quat)
        frame: relative_to_current_base_quat

action:
  dim: 31
  joint_order: il
  scale: action_scale[i] = 0.25 * effort_limit[i] / kp_train[i]
  application: "target_q_mj[i] = DEFAULT_DOF[i] + (action_il[mj_to_il[i]]) * action_scale[i]"

# ---------------------------------------------------------------------------
# Joint mappings live in the autogenerated header, not duplicated here:
#     gear_sonic_deploy/src/x2/agi_x2_deploy_onnx_ref/include/policy_parameters.hpp
#         isaaclab_to_mujoco[31]   mujoco_to_isaaclab[31]
#         kps[31]   kds[31]   x2_action_scale[31]   default_angles[31]
#         mujoco_joint_names[31]
# Regenerate via:
#     python gear_sonic_deploy/scripts/codegen_x2_policy_parameters.py
# ---------------------------------------------------------------------------
