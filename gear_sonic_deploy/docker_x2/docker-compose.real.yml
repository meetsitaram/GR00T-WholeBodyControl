# Real-robot DDS overlay for the X2 sim container.
#
# Usage (always with the base file):
#   docker compose -f docker-compose.yml -f docker-compose.real.yml run --rm x2sim
# or via the wrapper:
#   ./start_real.sh
#
# What this overlay changes versus the base docker-compose.yml:
#
#   * ROS_LOCALHOST_ONLY: "0"        — un-quarantine: talk to the real
#                                       robot on the SDK ethernet via DDS.
#   * ROS_DOMAIN_ID:     "0"         — match the AgiBot SDK's default
#                                       (record-and-replay/docker-compose.yml
#                                       uses this same value, which is what
#                                       lets it discover /aima/hal/* topics).
#   * CYCLONEDDS_URI:    enp10s0     — pin DDS discovery to the wired NIC
#                                       carrying 10.0.1.2/24, so it doesn't
#                                       waste packets scanning wifi /
#                                       tailscale / docker0.  Harmless under
#                                       FastDDS (just an unused env var) but
#                                       essential if anyone swaps the rmw.
# What it does NOT change from the sim base:
#   * network_mode: host             — kept; required for both DDS over the
#                                       SDK ethernet AND the HTTP MC stop on
#                                       PC1 (10.0.1.40:50080).
#   * X11 / NVIDIA passthrough       — kept; doesn't hurt to have them on
#                                       even if we're not using a viewer.
#   * Persistent colcon volumes      — kept; reuses the build artefacts the
#                                       sim mode produced.
#
# Pre-flight outside this file (operator's responsibility):
#   1. Plug the SDK cable into one of PC2/PC3's rear RJ45 dev ports.
#   2. Configure the host NIC with IP 10.0.1.2/24 (e.g. enp10s0).
#   3. Confirm `ping 10.0.1.41` from the host.
#   Without those, ROS_DOMAIN_ID=0 will still discover nothing because there
#   is no route to PC2.

services:
  x2sim:
    environment:
      # Override the sim isolation. Compose merges environment maps key-by-key
      # when both files use the dict form; the base file uses list form, but
      # the dict form here still overrides because docker compose internally
      # normalises both to a single map keyed by variable name.
      ROS_LOCALHOST_ONLY: "0"
      ROS_DOMAIN_ID: "0"
      CYCLONEDDS_URI: '<CycloneDDS><Domain><General><Interfaces><NetworkInterface name="enp10s0"/></Interfaces></General></Domain></CycloneDDS>'
      PYTHONUNBUFFERED: "1"
